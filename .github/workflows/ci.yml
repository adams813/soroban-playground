name: CI Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    - cron: "21 4 * * 1"

jobs:
  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Frontend
        run: npm run build --workspace=frontend --if-present

  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Backend Lint
        run: npm run lint:check --workspace=backend --if-present

      - name: Run Backend Format Check
        run: npm run format:check --workspace=backend --if-present

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit high/critical vulnerabilities
        run: npm audit --workspaces --audit-level=high

      - name: Run Snyk dependency scan
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          command: test
          args: --all-projects --severity-threshold=high --sarif-file-output=snyk-dependencies.sarif

      - name: Upload Snyk dependency report
        if: ${{ env.SNYK_TOKEN != '' && always() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-dependencies.sarif

      - name: Build backend container for image scan
        if: ${{ env.SNYK_TOKEN != '' }}
        run: docker build -t soroban-playground-backend:ci backend

      - name: Run Snyk container scan
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          image: soroban-playground-backend:ci
          args: --severity-threshold=high --sarif-file-output=snyk-container.sarif

      - name: Upload Snyk container report
        if: ${{ env.SNYK_TOKEN != '' && always() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-container.sarif

  rust-contracts:
    name: Rust / Soroban Contracts Build & Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt Check
        run: cargo fmt --all -- --check

      - name: Clippy Check
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust Tests
        run: cargo test --all-targets --all-features
